<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutomateCryptoSignals — Login</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 28px;
      max-width: 340px;
      width: 100%;
    }
    .card h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 4px;
      color: #c9d1d9;
    }
    .card .subtitle {
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 24px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    input[type="password"] {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      color: #c9d1d9;
      font-size: 14px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #1f6feb;
    }
    input[type="password"]::placeholder {
      color: #8b949e;
    }
    button {
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
      font-family: inherit;
    }
    button:hover {
      background: #388bfd;
    }
    button:active {
      opacity: 0.9;
    }
    .error-banner {
      display: none;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid #f85149;
      border-radius: 6px;
      padding: 10px 12px;
      color: #f85149;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-banner.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AutomateCryptoSignals</h1>
    <div class="subtitle">Dashboard access</div>

    <div class="error-banner" id="errorBanner">Incorrect password — try again.</div>

    <form method="POST" action="/login">
      <input
        type="password"
        name="password"
        placeholder="Password"
        autofocus
      />
      <button type="submit">Sign In</button>
    </form>
  </div>

  <script>
    const errorBanner = document.getElementById("errorBanner");
    if (new URLSearchParams(location.search).has("error")) {
      errorBanner.classList.add("show");
    }
  </script>
</body>
</html>
