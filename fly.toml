# fly.toml app configuration file generated for signalautomation on 2026-04-13T22:51:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'signalautomation'
primary_region = 'ams'

[mounts]
  source = "state_data"
  destination = "/app/state"

# The live config is owned by the instance: it lives on the state_data volume, not
# in git or the image. Deploys ship code only; config persists across deploys and is
# edited via the /admin web UI or scripts/config.py. On first boot the app seeds it
# from config.example.yaml if the volume has none.
[env]
  CONFIG_PATH = "/app/state/config.yaml"

[build]

# PUBLIC app — the read-only dashboard (/dashboard, /public/*) is reachable from the
# internet so the portfolio can be watched in real time. /health is also open (used by
# the healthcheck below). Every money-moving / sensitive endpoint (/signal/run, /state,
# /test/rebalance, /report/now, /admin/equity/reset) is gated by server.webhook_token
# (see require_admin_token in src/main.py). If the token is unset those endpoints
# fail-closed. There is no inbound webhook — the in-process generator drives all trades.
#
# Make it public (one-time, run from flyctl):
#   fly ips allocate-v4 --shared -a signalautomation     # shared v4 (free) for public ingress
#   fly ips allocate-v6 -a signalautomation              # public v6
#   fly ips list -a signalautomation                     # verify
# Then the dashboard is at: https://signalautomation.fly.dev/dashboard
# Set the Telegram secrets before deploying:
#   fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=... -a signalautomation
[http_service]
  internal_port = 8000
  force_https = true           # public TLS — redirect plain HTTP to HTTPS
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
